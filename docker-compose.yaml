services:
  trilium:
    image: triliumnext/notes:latest
    volumes:
      - trilium_data:/home/node/trilium-data
    expose:
      - "8080"
    restart: unless-stopped

  classifier:
    image: python:3.11-slim
    depends_on:
      - trilium
    environment:
      TRILIUM_URL: "http://trilium:8080"
      TRILIUM_TOKEN: "PASTE_YOUR_ETAPI_TOKEN_HERE"
      INBOX_NOTE_ID: "PASTE_YOUR_INBOX_NOTE_ID_HERE"
      GEMINI_API_KEY: "PASTE_YOUR_GEMINI_KEY_HERE"
      GEMINI_MODEL: "gemini-2.0-flash"
      SUBSPECIALTIES: "Neonatology,Cardiology,Pulmonology,Nephrology,Gastroenterology,Neurology,Hematology-Oncology,Infectious Disease,Endocrinology,Genetics-Metabolic,Rheumatology-Immunology,Dermatology,ENT,Ophthalmology,Emergency-PICU,General Pediatrics"
      POLL_INTERVAL_SECONDS: "300"
    command:
      - "sh"
      - "-c"
      - |
        pip install --no-cache-dir requests --quiet
        cat <<'PYEOF' > /app_main.py
        import os, time, json, requests

        TRILIUM_URL = os.environ["TRILIUM_URL"].rstrip("/")
        TOKEN = os.environ["TRILIUM_TOKEN"]
        INBOX_ID = os.environ["INBOX_NOTE_ID"]
        GEMINI_KEY = os.environ["GEMINI_API_KEY"]
        GEMINI_MODEL = os.environ.get("GEMINI_MODEL", "gemini-2.0-flash")
        SUBSPECIALTIES = [s.strip() for s in os.environ["SUBSPECIALTIES"].split(",")]
        POLL = int(os.environ.get("POLL_INTERVAL_SECONDS", "300"))

        HEADERS = {"Authorization": TOKEN, "Content-Type": "application/json"}

        def etapi_get(path, params=None):
            r = requests.get(f"{TRILIUM_URL}/etapi{path}", headers=HEADERS, params=params, timeout=30)
            r.raise_for_status()
            return r.json()

        def etapi_post(path, body):
            r = requests.post(f"{TRILIUM_URL}/etapi{path}", headers=HEADERS, json=body, timeout=30)
            r.raise_for_status()
            return r.json()

        def etapi_delete(path):
            r = requests.delete(f"{TRILIUM_URL}/etapi{path}", headers=HEADERS, timeout=30)
            return r.status_code

        def get_note_content(note_id):
            r = requests.get(f"{TRILIUM_URL}/etapi/notes/{note_id}/content", headers=HEADERS, timeout=30)
            r.raise_for_status()
            return r.text

        def ensure_notebook(title, parent_id):
            found = etapi_get("/notes", params={"search": f'note.title = "{title}" and note.parents.noteId = "{parent_id}"'})
            results = found.get("results", [])
            if results:
                return results[0]["noteId"]
            created = etapi_post("/create-note", {
                "parentNoteId": parent_id, "title": title, "type": "text", "content": f"<p>{title} notes</p>"
            })
            return created["note"]["noteId"]

        def classify(text):
            options = "\n".join(f"- {s}" for s in SUBSPECIALTIES)
            prompt = (
                "You are sorting a pediatric clinical note into exactly one subspecialty from this list:\n"
                f"{options}\n\n"
                "Return ONLY the exact matching label from the list, nothing else.\n\n"
                f"Note:\n{text[:3000]}"
            )
            url = f"https://generativelanguage.googleapis.com/v1beta/models/{GEMINI_MODEL}:generateContent?key={GEMINI_KEY}"
            resp = requests.post(url, json={"contents": [{"parts": [{"text": prompt}]}]}, timeout=60)
            resp.raise_for_status()
            label = resp.json()["candidates"][0]["content"]["parts"][0]["text"].strip()
            for s in SUBSPECIALTIES:
                if s.lower() in label.lower():
                    return s
            return "General Pediatrics"

        def move_note(note_id, old_parent_id, new_parent_id):
            etapi_post("/branches", {"noteId": note_id, "parentNoteId": new_parent_id})
            old_branch_id = f"{old_parent_id}_{note_id}"
            etapi_delete(f"/branches/{old_branch_id}")

        def main():
            print("Setting up notebook structure...", flush=True)
            diseases_root = ensure_notebook("Diseases", "root")
            notebook_map = {s: ensure_notebook(s, diseases_root) for s in SUBSPECIALTIES}
            print("Ready. Notebooks:", notebook_map, flush=True)

            while True:
                try:
                    found = etapi_get("/notes", params={"search": f'note.parents.noteId = "{INBOX_ID}"'})
                    for note in found.get("results", []):
                        note_id = note["noteId"]
                        title = note.get("title", "")
                        content = get_note_content(note_id)
                        text = f"{title}\n{content}"
                        label = classify(text)
                        target_id = notebook_map.get(label, notebook_map["General Pediatrics"])
                        move_note(note_id, INBOX_ID, target_id)
                        print(f"Moved '{title}' -> {label}", flush=True)
                except Exception as e:
                    print("Error in poll loop:", e, flush=True)
                time.sleep(POLL)

        if __name__ == "__main__":
            main()
        PYEOF
        python /app_main.py

volumes:
  trilium_data:
